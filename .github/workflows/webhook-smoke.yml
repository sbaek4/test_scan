name: Webhook Smoke Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  send-webhook:
    runs-on: ubuntu-latest
    steps:
      - name: Build webhook payload
        id: payload
        shell: bash
        run: |
          cat > payload.json <<'EOF'
          {
            "ref": "refs/heads/${{ github.ref_name }}",
            "after": "${{ github.sha }}",
            "repository": {
              "full_name": "${{ github.repository }}",
              "ssh_url": "https://github.com/${{ github.repository }}.git"
            },
            "head_commit": {
              "id": "${{ github.sha }}",
              "message": "github-actions webhook smoke test",
              "timestamp": "${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}",
              "author": {
                "name": "${{ github.actor }}",
                "email": "actions@github.com"
              }
            }
          }
          EOF

      - name: Sign payload
        if: ${{ secrets.WEBHOOK_SECRET != '' && secrets.WEBHOOK_TARGET_URL != '' }}
        id: sign
        shell: bash
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          SIGNATURE=$(openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" payload.json | awk '{print $2}')
          echo "signature=sha256=$SIGNATURE" >> "$GITHUB_OUTPUT"

      - name: Send webhook request
        if: ${{ secrets.WEBHOOK_SECRET != '' && secrets.WEBHOOK_TARGET_URL != '' }}
        shell: bash
        env:
          TARGET_URL: ${{ secrets.WEBHOOK_TARGET_URL }}
          SIGNATURE: ${{ steps.sign.outputs.signature }}
          DELIVERY_ID: gha-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" \
            -X POST "$TARGET_URL/webhooks/github" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Delivery: $DELIVERY_ID" \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            --data-binary @payload.json)
          cat response.json
          test "$HTTP_CODE" -ge 200
          test "$HTTP_CODE" -lt 300

      - name: Skip when webhook secrets are not configured
        if: ${{ secrets.WEBHOOK_SECRET == '' || secrets.WEBHOOK_TARGET_URL == '' }}
        run: |
          echo "Skipping webhook smoke request because WEBHOOK_SECRET/WEBHOOK_TARGET_URL is not set."
