services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: test_scan
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      - postgres
      - kafka
      - dynamodb
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://app:app@postgres:5432/test_scan
      KAFKA_BROKER: kafka:29092
      WEBHOOK_SECRET: dev_secret
      SCAN_REQUEST_TOPIC: scan.requests
      SCAN_DLQ_TOPIC: scan.requests.dlq
      AUTH_JWT_SECRET: dev_auth_secret
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 120
      DYNAMO_TABLE_NAME: scan_items
      DYNAMODB_ENDPOINT: http://dynamodb:8000
      AWS_REGION: us-east-1
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    depends_on:
      - postgres
      - kafka
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/test_scan
      KAFKA_BROKER: kafka:29092
      SCAN_REQUEST_TOPIC: scan.requests
      SCAN_DLQ_TOPIC: scan.requests.dlq
      SCAN_RETRY_COUNT: 3
      SCAN_RETRY_DELAY_MS: 750
      DYNAMODB_ENDPOINT: http://dynamodb:8000
      AWS_REGION: us-east-1
      DYNAMO_JOB_CACHE_TABLE: finished_scan_jobs
      JOB_CACHE_TTL_SECONDS: 86400
      GITHUB_TOKEN: ""

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    environment:
      VITE_API_PROXY_TARGET: http://api:3000
    ports:
      - "5173:5173"

  dynamodb:
    image: amazon/dynamodb-local:latest
    command: "-jar DynamoDBLocal.jar -inMemory -sharedDb"
    ports:
      - "8000:8000"

volumes:
  pg_data:
